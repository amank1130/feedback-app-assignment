{% extends "base.html" %}

{% block title %}Submit Feedback{% endblock %}

{% block content %}
<h1>Submit your feedback</h1>

<form method="POST">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ name or '' }}" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required>
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea name="message" rows="5" required>{{ message or '' }}</textarea>
    </div>

    <button type="submit" class="btn">Submit</button>
</form>
{% endblock %}
